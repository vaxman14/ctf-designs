<style>
:root{--ink:#14121a;--ink-soft:#413c4e;--violet:#7c3aed;--orange:#ff7a1a;--bg:#fff;--grad:linear-gradient(100deg,#a855f7 0%,#7c3aed 42%,#ff7a1a 100%)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,system-ui,sans-serif;color:var(--ink);background:radial-gradient(900px 500px at 80% -10%,rgba(255,122,26,.10),transparent 60%),radial-gradient(800px 500px at 5% 0%,rgba(124,58,237,.12),transparent 55%),var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.6}
.card{max-width:540px;text-align:center}
.logo{width:64px;height:64px;border-radius:50%;margin:0 auto 22px;display:block}
h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(28px,5vw,40px);font-weight:700;margin-bottom:14px;letter-spacing:-.02em}
.grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
p{color:var(--ink-soft);font-size:17px;margin-bottom:12px}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:26px}
.btn{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:16px;padding:14px 24px;border-radius:999px;text-decoration:none;transition:transform .18s}
.btn:hover{transform:translateY(-3px)}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 10px 26px rgba(124,58,237,.3)}
.btn-ghost{border:1.5px solid #e2ddec;color:var(--ink)}
.small{font-size:14px;color:var(--ink-soft);margin-top:20px}
</style>
</head>
<body>
<div class="card">
  <img class="logo" src="images/logo.png" alt="CTF Designs">
  <h1>Got it. <span class="grad">Thank you!</span></h1>
  <p>Your request landed with us. A real person (hi, Roman 👋) will look it over and get back to you personally, usually within a business day.</p>
  <p>Keep an eye on your inbox.</p>
  <div class="btns">
    <a class="btn btn-primary" href="/">Back to home</a>
    <a class="btn btn-ghost" href="/work.html">See our work</a>
  </div>
  <div class="small">Need something fast? Call or text <a href="tel:+19514254567" style="color:var(--violet);font-weight:600">(951) 425-4567</a>.</div>
</div>
</body>
