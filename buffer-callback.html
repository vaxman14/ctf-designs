<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buffer Auth</title>
<style>
  body { font-family: monospace; background: #111; color: #0f0; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; flex-direction: column; }
  #code { font-size: 1.2em; background: #000; padding: 16px 24px; border-radius: 8px; word-break: break-all; max-width: 600px; text-align: center; }
  h2 { color: #fff; }
</style>
</head>
<body>
<h2>Buffer Auth Code</h2>
<div id="code">Reading...</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');
  if (code) {
    document.getElementById('code').textContent = code;
  } else if (error) {
    document.getElementById('code').textContent = 'Error: ' + error;
  } else {
    document.getElementById('code').textContent = 'No code found in URL.';
  }
</script>
</body>
</html>
